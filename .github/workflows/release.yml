name: Release

on:
  push:
    tags:
      - "0.*"

permissions:
  attestations: write
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify version
        run: |
          node -e 'const fs=require("fs"); const read=(file)=>JSON.parse(fs.readFileSync(file,"utf8")); const tag=process.env.GITHUB_REF_NAME; const manifest=read("manifest.json"); const pkg=read("package.json"); const lock=read("package-lock.json"); const versions=read("versions.json"); for (const [file,version] of [["manifest.json",manifest.version],["package.json",pkg.version],["package-lock.json",lock.version],["package-lock.json packages root",lock.packages?.[""]?.version]]) { if (version !== tag) throw new Error(file + " version " + version + " does not match tag " + tag); } if (versions[tag] !== manifest.minAppVersion) throw new Error("versions.json[" + tag + "] must equal manifest minAppVersion " + manifest.minAppVersion);'

      - name: Install PDF and image verification tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes fonts-noto-cjk poppler-utils python3-pil

      - name: Test selectable Korean PDF and render fidelity
        run: npm run test:ci
        env:
          PYTHON: /usr/bin/python3

      - name: Upload visual regression artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: render-fidelity-${{ github.sha }}
          path: |
            tmp/pdfs/render-fidelity/
            tmp/pdfs/a4-boundary-clipping/
          if-no-files-found: warn
          retention-days: 14

      - name: Build release ZIP
        run: npm run release

      - name: Validate assets
        run: |
          node --check main.js
          node -e "for (const f of ['manifest.json','package.json','package-lock.json','versions.json']) JSON.parse(require('fs').readFileSync(f,'utf8'));"
          for marker in \
            "Copyright (c) 2019 Andrew Dillon" \
            "Copyright (c) Microsoft Corporation" \
            "Copyright 2013 Google Inc. All Rights Reserved." \
            "Apache License" \
            "Copyright 2008 Fair Oaks Labs, Inc." \
            "Jean-loup Gailly and Mark Adler" \
            "HarfBuzz is licensed under the so-called" \
            "Copyright © 1991-2016 Unicode, Inc." \
            "deep-equal 1.1.1" \
            "es-abstract 1.17.5" \
            "Lodash 4.17.15" \
            "Copyright (c) 2012, 2013, 2014 James Halliday" \
            "Copyright (c) 2014 Jordan Harband" \
            "Copyright OpenJS Foundation and other contributors" \
            "Reserved Font Name" \
            "SIL OPEN FONT LICENSE"; do
            grep --fixed-strings --quiet "$marker" main.js
          done
          unzip -t "dist/mobile-pdf-exporter-kr-${GITHUB_REF_NAME}.zip"
          unzip -l "dist/mobile-pdf-exporter-kr-${GITHUB_REF_NAME}.zip" | grep --fixed-strings --quiet "THIRD_PARTY_LICENSES.txt"

      - name: Attest release assets
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/mobile-pdf-exporter-kr-${{ github.ref_name }}.zip
            manifest.json
            main.js
            styles.css
            LICENSE
            CHANGELOG.md
            THIRD_PARTY_NOTICES.md
            THIRD_PARTY_LICENSES.txt
            fonts/LICENSE-OFL.txt
            fonts/FONTLOG.txt
            fonts/NotoSansCJKkr-Regular.ko-subset.ttf

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "dist/mobile-pdf-exporter-kr-${GITHUB_REF_NAME}.zip" \
            manifest.json main.js styles.css \
            LICENSE CHANGELOG.md THIRD_PARTY_NOTICES.md THIRD_PARTY_LICENSES.txt \
            fonts/LICENSE-OFL.txt fonts/FONTLOG.txt \
            fonts/NotoSansCJKkr-Regular.ko-subset.ttf \
            --title "${GITHUB_REF_NAME}" \
            --notes "A4처럼 소수점 높이를 가진 용지에서 마지막 1px 미만의 내용과 얕은 글리프 교차가 잘리던 문제를 수정했습니다. 페이지 경계를 반복 검증해 문장 전체를 다음 페이지로 옮기며 Chrome·WKWebView·Poppler 악조건 회귀 검증을 추가했습니다. 자세한 변경점은 CHANGELOG.md를 참조하세요. main.js와 ZIP에는 글꼴 및 모든 제3자 라이선스 고지가 포함되어 있습니다."
