name: Release

on:
  push:
    tags:
      - "0.*"

permissions:
  attestations: write
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify version
        run: |
          node -e "const fs=require('fs'); const tag=process.env.GITHUB_REF_NAME; for (const file of ['manifest.json','package.json']) { const version=JSON.parse(fs.readFileSync(file,'utf8')).version; if (version !== tag) { throw new Error(`${file} version ${version} does not match tag ${tag}`); } }"

      - name: Build
        run: npm run build

      - name: Type check
        run: npx tsc --noEmit

      - name: Validate assets
        run: |
          node --check main.js
          node -e "for (const f of ['manifest.json','package.json','package-lock.json','versions.json']) JSON.parse(require('fs').readFileSync(f,'utf8'));"

      - name: Attest release assets
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            manifest.json
            main.js
            styles.css

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" manifest.json main.js styles.css --title "${GITHUB_REF_NAME}" --notes "Community review cleanup release. Standard release assets only."
